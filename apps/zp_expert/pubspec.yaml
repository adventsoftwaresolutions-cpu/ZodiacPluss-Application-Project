name: zp_expert
description: ZodiacPluss - Expert App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  lottie: ^3.3.3
  skeletonizer: ^1.4.2
  shimmer: ^3.0.0
  flutter_localizations:
    sdk: flutter

  # --- SHARED CORE (local path) ---
  zp_core:
    path: ../../packages/zp_core

  # --- Same stack as client ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  supabase_flutter: ^2.15.4
  agora_rtc_engine: ^6.5.4
  flutter_secure_storage: ^9.2.4
  http: ^1.6.0
  permission_handler: ^11.3.1
  flutter_ringtone_player: ^4.0.0+4
  intl: ^0.20.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  rive: ^0.14.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/blob/
    - assets/icons/kundali/
    - assets/animation/
