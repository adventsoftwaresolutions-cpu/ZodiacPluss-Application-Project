name: zp_client
description: ZodiacPluss - Client App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- SHARED CORE (local path) ---
  zp_core:
    path: ../../packages/zp_core

  # --- Riverpod ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Supabase ---
  supabase_flutter: ^2.15.4

  # --- Agora ---
  agora_rtc_engine: ^6.5.3

  # --- Payments ---
  razorpay_flutter: ^1.3.7

  # --- Localization ---
  intl: ^0.20.2

  # --- Utils ---
  flutter_svg: ^2.3.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  