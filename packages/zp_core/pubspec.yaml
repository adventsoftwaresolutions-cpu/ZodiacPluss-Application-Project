name: zp_core
description: Shared core package for ZodiacPluss
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.15.4

  # Networking
  dio: ^5.4.0

  # Secure local storage
  flutter_secure_storage: ^9.2.0

  # Locallization
  intl: ^0.20.2

  # Shared UI
  flutter_svg: ^2.3.0
  shimmer: ^3.0.0

  # Video / Audio Calling
  agora_rtc_engine: ^6.5.4
  permission_handler: ^11.3.1

  # Utils
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/kundali/
